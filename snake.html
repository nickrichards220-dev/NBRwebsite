<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky-1: #f9eee9;
      --sky-2: #f8d6cb;
      --mint: #ffd1c4;
      --leaf: #f4623a;
      --leaf-dark: #cf4f2d;
      --apple: #ff6157;
      --apple-dark: #d63f37;
      --panel: #ffffff;
      --ink: #212529;
      --ink-soft: #5b6a7d;
      --grid: #f3d7ce;
      --board-bg: #fff6f3;
      --board-border: #f4623a;
      --overlay: rgba(35, 52, 68, 0.45);
      --shadow: 0 16px 40px rgba(45, 72, 95, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Nunito", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.65), transparent 36%),
        radial-gradient(circle at 80% 75%, rgba(255, 255, 255, 0.6), transparent 42%),
        linear-gradient(145deg, var(--sky-1), var(--sky-2));
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .game-wrap {
      width: min(92vw, 560px);
      background: var(--panel);
      border: 3px solid #ffffff;
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 1rem;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .game-wrap::before {
      content: "";
      position: absolute;
      inset: -30% auto auto -15%;
      width: 180px;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(132, 220, 125, 0.45), transparent 70%);
      z-index: -1;
      transform: rotate(-12deg);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-family: "Press Start 2P", cursive;
      font-size: clamp(0.7rem, 1.7vw, 0.92rem);
      color: var(--leaf-dark);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .scores {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .chip {
      background: #fff;
      border: 2px solid #f2ddd6;
      color: var(--ink-soft);
      font-weight: 800;
      border-radius: 999px;
      padding: 0.25rem 0.65rem;
      font-size: 0.87rem;
      white-space: nowrap;
    }

    .chip span {
      color: var(--leaf-dark);
      margin-left: 0.3rem;
    }

    .board-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 18px;
      border: 3px solid var(--board-border);
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        var(--board-bg);
      background-size: 5% 5%, 5% 5%, auto;
      overflow: hidden;
      touch-action: none;
    }

    #board {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
      color: #fff;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1rem;
      transition: opacity 0.2s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.48);
      backdrop-filter: blur(4px);
      border-radius: 18px;
      padding: 1rem 1.2rem;
      width: min(88%, 320px);
    }

    .overlay h2 {
      margin: 0 0 0.45rem;
      font-family: "Press Start 2P", cursive;
      font-size: clamp(0.7rem, 1.9vw, 0.95rem);
      line-height: 1.5;
    }

    .overlay p {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .controls {
      margin-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }

    .buttons {
      display: flex;
      gap: 0.55rem;
    }

    .control-btn {
      border: none;
      border-radius: 999px;
      padding: 0.48rem 0.85rem;
      font-family: "Nunito", sans-serif;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f67652, #e75d35);
      box-shadow: 0 5px 0 #bf4724;
      transition: transform 0.06s ease;
      font-size: 0.95rem;
    }

    .control-btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #bf4724;
    }

    .hint {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink-soft);
    }

    @media (max-width: 540px) {
      .game-wrap {
        border-radius: 18px;
        padding: 0.8rem;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .buttons {
        justify-content: center;
      }

      .hint {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="game-wrap" aria-label="Snake game board">
    <div class="topbar">
      <h1 class="title">Snake</h1>
      <div class="scores">
        <div class="chip">Score <span id="score">0</span></div>
        <div class="chip">Best <span id="best">0</span></div>
      </div>
    </div>

    <div class="board-wrap" id="boardWrap">
      <canvas id="board" width="500" height="500"></canvas>

      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <h2 id="overlayTitle">Press Any Arrow Key</h2>
          <p id="overlayText">Use arrow keys or swipe to start.</p>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="buttons">
        <a class="control-btn" href="index.html">Return</a>
        <button class="control-btn" id="restartBtn" type="button">Restart</button>
        <button class="control-btn" id="pauseBtn" type="button">Pause</button>
      </div>
      <p class="hint">Move: Arrow keys or swipe</p>
    </div>
  </main>

  <script>
    const GRID_SIZE = 20;
    const BASE_SPEED = 120;

    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");

    const storedBest = Number(localStorage.getItem("snake_best_score") || 0);
    let bestScore = Number.isFinite(storedBest) ? storedBest : 0;
    let score = 0;

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let timer = null;
    let started = false;
    let paused = false;
    let dead = false;

    bestEl.textContent = bestScore;

    function resetGame(showOverlay = true) {
      snake = [
        { x: 6, y: 10 },
        { x: 5, y: 10 },
        { x: 4, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      started = false;
      paused = false;
      dead = false;
      updateScore();
      placeFood();
      draw();

      if (showOverlay) {
        setOverlay("Press Any Arrow Key", "Use arrow keys or swipe to start.");
      } else {
        hideOverlay();
      }

      pauseBtn.textContent = "Pause";
      stopLoop();
    }

    function setOverlay(title, text) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlay.classList.remove("hidden");
    }

    function hideOverlay() {
      overlay.classList.add("hidden");
    }

    function updateScore() {
      scoreEl.textContent = score;
      if (score > bestScore) {
        bestScore = score;
        bestEl.textContent = bestScore;
        localStorage.setItem("snake_best_score", String(bestScore));
      }
    }

    function placeFood() {
      let valid = false;
      while (!valid) {
        food = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
        valid = !snake.some((part) => part.x === food.x && part.y === food.y);
      }
    }

    function startLoop() {
      if (timer) {
        clearInterval(timer);
      }
      timer = setInterval(step, BASE_SPEED);
    }

    function stopLoop() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function step() {
      if (!started || paused || dead) {
        return;
      }

      direction = nextDirection;

      const newHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall =
        newHead.x < 0 ||
        newHead.x >= GRID_SIZE ||
        newHead.y < 0 ||
        newHead.y >= GRID_SIZE;

      const hitSelf = snake.some((part) => part.x === newHead.x && part.y === newHead.y);

      if (hitWall || hitSelf) {
        dead = true;
        stopLoop();
        setOverlay("Game Over", "Press Restart to play again.");
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 1;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function drawRoundedCell(x, y, color, radius = 8, stroke = null) {
      const cell = canvas.width / GRID_SIZE;
      const px = x * cell;
      const py = y * cell;
      const size = cell;
      const r = Math.min(radius, size / 2);

      ctx.beginPath();
      ctx.moveTo(px + r, py);
      ctx.arcTo(px + size, py, px + size, py + size, r);
      ctx.arcTo(px + size, py + size, px, py + size, r);
      ctx.arcTo(px, py + size, px, py, r);
      ctx.arcTo(px, py, px + size, py, r);
      ctx.closePath();

      ctx.fillStyle = color;
      ctx.fill();

      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function drawEyes() {
      const cell = canvas.width / GRID_SIZE;
      const head = snake[0];
      const px = head.x * cell;
      const py = head.y * cell;

      const ox = direction.x !== 0 ? (direction.x > 0 ? 13 : 7) : 10;
      const oy = direction.y !== 0 ? (direction.y > 0 ? 13 : 7) : 10;
      const spread = direction.x !== 0 ? { x: 0, y: 4 } : { x: 4, y: 0 };

      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(px + ox, py + oy, 2.6, 0, Math.PI * 2);
      ctx.arc(px + ox + spread.x, py + oy + spread.y, 2.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#1d2b38";
      ctx.beginPath();
      ctx.arc(px + ox + (direction.x === 1 ? 0.8 : direction.x === -1 ? -0.8 : 0), py + oy + (direction.y === 1 ? 0.8 : direction.y === -1 ? -0.8 : 0), 1.2, 0, Math.PI * 2);
      ctx.arc(px + ox + spread.x + (direction.x === 1 ? 0.8 : direction.x === -1 ? -0.8 : 0), py + oy + spread.y + (direction.y === 1 ? 0.8 : direction.y === -1 ? -0.8 : 0), 1.2, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawRoundedCell(food.x, food.y, "#ff6157", 10, "#d63f37");

      snake.forEach((part, idx) => {
        const isHead = idx === 0;
        drawRoundedCell(part.x, part.y, isHead ? "#f4623a" : "#f88969", 7, isHead ? "#cf4f2d" : null);
      });

      drawEyes();
    }

    function isOpposite(nextX, nextY) {
      return direction.x + nextX === 0 && direction.y + nextY === 0;
    }

    function setDirection(x, y) {
      if (dead) {
        return;
      }
      if (isOpposite(x, y)) {
        return;
      }

      nextDirection = { x, y };
      if (!started) {
        started = true;
        hideOverlay();
        startLoop();
      }
    }

    window.addEventListener("keydown", (event) => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) {
        event.preventDefault();
      }

      if (event.key === "ArrowUp") setDirection(0, -1);
      if (event.key === "ArrowDown") setDirection(0, 1);
      if (event.key === "ArrowLeft") setDirection(-1, 0);
      if (event.key === "ArrowRight") setDirection(1, 0);

      if (event.key.toLowerCase() === " ") {
        togglePause();
      }
    });

    pauseBtn.addEventListener("click", togglePause);
    restartBtn.addEventListener("click", () => resetGame(true));

    function togglePause() {
      if (!started || dead) {
        return;
      }

      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";

      if (paused) {
        setOverlay("Paused", "Press Resume to continue.");
      } else {
        hideOverlay();
      }
    }

    let touchStartX = 0;
    let touchStartY = 0;

    const boardWrap = document.getElementById("boardWrap");

    boardWrap.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    boardWrap.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;

      const absX = Math.abs(deltaX);
      const absY = Math.abs(deltaY);
      const minSwipe = 16;

      if (absX < minSwipe && absY < minSwipe) {
        return;
      }

      if (absX > absY) {
        setDirection(deltaX > 0 ? 1 : -1, 0);
      } else {
        setDirection(0, deltaY > 0 ? 1 : -1);
      }
    }, { passive: true });

    resetGame(true);
  </script>
</body>
</html>
